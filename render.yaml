# ─────────────────────────────────────────────────────────────────────────────
# Render Infrastructure-as-Code (IaC) Blueprint
# https://render.com/docs/blueprint-spec
#
# Defines the backend web service for the Playwright Automation Dashboard.
# The frontend is deployed separately on Vercel.
# ─────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: playwright-backend
    
    # ── Docker Configuration ──────────────────────────────────────────────────
    env: docker
    rootDir: .
    region: oregon

    # ── Compute Requirements ──────────────────────────────────────────────────
    plan: standard

    # ── Auto-deploy on every push to master ───────────────────────────────────
    branch: master
    autoDeploy: true

    # ── Health Check ──────────────────────────────────────────────────────────
    healthCheckPath: /health

    # ── Persistent Storage ────────────────────────────────────────────────────
    disk:
      name: artifact-storage
      # Must exactly match the absolute path inside the Docker container
      mountPath: /app/backend/uploads
      sizeGB: 10

    # ── Environment Variables ─────────────────────────────────────────────────
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: "0.0.0.0"
      - key: CORS_ORIGIN
        # MUST exactly match your deployed Vercel URL (e.g. https://your-app-name.vercel.app)
        value: "https://your-app-name.vercel.app"
      - key: PLAYWRIGHT_PROJECT_PATH
        value: "../automation"
      - key: PLAYWRIGHT_HEADED
        value: "false"
      - key: UPLOADS_DIR
        value: "uploads"
      - key: LOG_LEVEL
        value: info
      # Note: PORT is intentionally OMITTED. Render injects the PORT dynamically.
